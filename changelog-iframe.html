<!DOCTYPE html>
<html lang="en-US">
    <meta charset="ISO-8859-1">

    <title>Changelog</title>
	<link rel="icon" type="image/x-icon" href="logo.png">

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>

	<link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/fomantic-ui@2.9.4/dist/semantic.min.css">

	<script src="https://cdn.jsdelivr.net/npm/fomantic-ui@2.9.4/dist/semantic.min.js"></script>

	<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.9.4/Chart.js"></script>

	<script src="https://cdn.jsdelivr.net/npm/chart.js@3.0.0/dist/chart.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
</html>
<style>
	@font-face {
		font-family: headerFont;
		src: url(fonts/PoppinsMedium-1JPv.otf);
	}
	@font-face {
		font-family: textFont;
		src: url(fonts/PoppinsRegular-B2Bw.otf);
	}
	h2 span {
		font-family: headerFont;
	}
	p {
		font-family: textFont;
	}
	/* This is for PC only */
	@media only screen and (min-width: 992px) {
		p {
			font-size: 1rem;
		}
	}
	/* This is for Mobile and Tablet only */
	@media only screen and (max-width: 991px) {
		p {
			font-size: 1.5rem;
		}
		h2 span {
			font-size: 2.5rem;
		}
	}
	body {
		background-color: transparent;
	}
</style>
<body>
    <div class="ui padded stackable fluid grid">
		<div class="row">
			<div class="column">
				<h2 class="ui header"><span class="ui text"><em data-emoji=":bookmark:" class="small"></em>Changelog</span></h2>
			</div>
		</div>

		<div class="row">
			<div class="column">
				<div class="ui floating info message">
					<p>This page contains all the updates of the <b>Web Guide</b>. If you are looking for the <b>updates of the game</b>, check the discord channel <a href="https://discord.com/channels/1509153777104588950/1520012610043510974" target="_blank"><b>-patchnote</b></a></p>
				</div>
			</div>
		</div>
	</div>
</body>
<script>
$(document).ready(function() {
	const viewportWidth  = window.innerWidth;
	
	if(viewportWidth >= 992) {
		document.querySelector("#page-header span").classList.add('medium');
		document.querySelector("#page-header span").classList.remove('large');
	}else {
		document.querySelector("#page-header span").classList.add('large');
		document.querySelector("#page-header span").classList.remove('medium');
	}
});
</script>
